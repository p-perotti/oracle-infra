name: Verify delivery mechanism

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    name: Verify caller to host contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate shell syntax
        run: |
          sh -n host/deploy-release.sh workflow/dispatch.sh test/fixtures/caller \
            test/fixtures/fake-curl test/fixtures/fake-docker test/fixtures/smoke-test \
            .github/actions/materialize/materialize.sh
          bash -n host/bootstrap-lock.sh test/deploy_acceptance.sh test/workflow_contract.sh test/materialize_action.sh \
            edge/scripts/deploy-edge.sh edge/scripts/verify-edge.sh

      - name: Verify private action materialization
        run: bash test/materialize_action.sh

      - name: Exercise the composite action manifest
        uses: ./.github/actions/materialize
        with:
          destination: .verified-materialization

      - name: Compare the composite action output
        run: |
          cmp workflow/dispatch.sh .verified-materialization/workflow/dispatch.sh
          cmp host/deploy-release.sh .verified-materialization/host/deploy-release.sh

      - name: Exercise the reusable seam
        run: bash test/deploy_acceptance.sh

      - name: Verify the reusable workflow interface
        run: bash test/workflow_contract.sh

      - name: Validate the shared edge definition
        run: docker compose --file edge/compose.yaml config --quiet
